name: Nexus CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  lint-and-test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: ruff check libs/ services/
      - run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:nexus@localhost:5432/nexus

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-test-frontend, lint-and-test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push images
        run: |
          build_push() {
            local dir="$1"
            local image="$2"
            local tag="${{ secrets.ECR_REGISTRY }}/nexus-${image}:${{ github.sha }}"
            docker build -f "services/${dir}/Dockerfile" -t "$tag" .
            docker push "$tag"
            cosign sign --yes "$tag"
          }
          build_push identity identity
          build_push content content
          build_push social_graph social-graph
          build_push professional professional
          build_push hub hub
          build_push commerce commerce
          build_push collaboration collaboration
          build_push notification notification