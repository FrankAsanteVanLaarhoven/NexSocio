openapi: 3.1.0
info:
  title: NEXSOCIO Notification API
  version: 1.0.0
  description: WebSocket push and notification inbox
servers:
  - url: http://localhost:8010/api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service healthy
  /notifications:
    post:
      summary: Create notification (internal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
      responses:
        "200":
          description: Notification created
  /inbox:
    get:
      summary: User notification inbox
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Inbox summary with unread count
  /notifications/{notification_id}/read:
    post:
      summary: Mark notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated notification
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CreateNotificationRequest:
      type: object
      required: [user_id, type, title]
      properties:
        user_id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
    InboxSummary:
      type: object
      properties:
        unread_count:
          type: integer
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        created_at:
          type: string
          format: date-time