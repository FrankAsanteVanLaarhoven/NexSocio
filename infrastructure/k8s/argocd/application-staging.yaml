apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FrankAsanteVanLaarhoven/NExsocio.git
    targetRevision: develop
    path: infrastructure/k8s/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true