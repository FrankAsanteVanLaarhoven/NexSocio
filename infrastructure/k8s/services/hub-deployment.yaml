apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub
  namespace: nexus
  labels:
    app: hub
    bounded-context: hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hub
  template:
    metadata:
      labels:
        app: hub
        version: v1
    spec:
      containers:
        - name: hub
          image: ${ECR_REGISTRY}/nexus-hub:latest
          ports:
            - containerPort: 8007
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-jwt
                  key: secret
            - name: CONTENT_SERVICE_URL
              value: http://content:8003
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8007
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hub
  namespace: nexus
spec:
  selector:
    app: hub
  ports:
    - port: 8007
      targetPort: 8007