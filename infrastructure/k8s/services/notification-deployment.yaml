apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: nexus
  labels:
    app: notification
    bounded-context: notification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        version: v1
    spec:
      containers:
        - name: notification
          image: ${ECR_REGISTRY}/nexus-notification:latest
          ports:
            - containerPort: 8010
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-db
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-jwt
                  key: secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: nexus
spec:
  selector:
    app: notification
  ports:
    - port: 8010
      targetPort: 8010