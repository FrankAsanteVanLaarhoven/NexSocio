apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety
  namespace: nexus
  labels:
    app: safety
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safety
  template:
    metadata:
      labels:
        app: safety
    spec:
      containers:
        - name: safety
          image: ${ECR_REGISTRY}/nexus-safety:latest
          ports:
            - containerPort: 8005
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-db
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-jwt
                  key: secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: safety
  namespace: nexus
spec:
  selector:
    app: safety
  ports:
    - port: 8005
      targetPort: 8005