apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-agent
  namespace: nexus
  labels:
    app: robot-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-agent
  template:
    metadata:
      labels:
        app: robot-agent
    spec:
      containers:
        - name: robot-agent
          image: ${ECR_REGISTRY}/nexus-robot-agent:latest
          ports:
            - containerPort: 8006
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-db
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-jwt
                  key: secret
            - name: SAFETY_SERVICE_URL
              value: "http://safety:8005"
---
apiVersion: v1
kind: Service
metadata:
  name: robot-agent
  namespace: nexus
spec:
  selector:
    app: robot-agent
  ports:
    - port: 8006
      targetPort: 8006